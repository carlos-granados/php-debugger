name: Claude Code Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      run_review: ${{ steps.decide.outputs.run_review }}
    steps:
      - name: Auto-label trusted authors
        if: >
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "$PR" --repo "$REPO" --add-label claude-review

      - name: Decide whether to review
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if gh pr view "$PR" --repo "$REPO" --json labels -q '.labels[].name' | grep -qx 'claude-review'; then
            echo "run_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_review=false" >> "$GITHUB_OUTPUT"
          fi

  claude-review:
    needs: gate
    if: needs.gate.outputs.run_review == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: |
            --model "claude-opus-4-7"
